
ServerRoot "C:/laragon/www/envbox-pro/environments/apache/Apache24"
Listen 8083

# Core modules
LoadModule authn_core_module modules/mod_authn_core.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule dir_module modules/mod_dir.so
LoadModule mime_module modules/mod_mime.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule rewrite_module modules/mod_rewrite.so

# Optional modules (load if exist)
LoadModule headers_module modules/mod_headers.so
LoadModule deflate_module modules/mod_deflate.so
LoadModule expires_module modules/mod_expires.so
LoadModule filter_module modules/mod_filter.so

# PHP Module
LoadModule php_module "C:/laragon/www/envbox-pro/environments/php/8.1.10/php8apache2_4.dll"
<FilesMatch \.php$>
    SetHandler application/x-httpd-php
</FilesMatch>
PHPIniDir "C:/laragon/www/envbox-pro/projects/adminer"

ServerName adminer.localhost
DocumentRoot "C:/laragon/www/envbox-pro/projects/adminer"

<Directory "C:/laragon/www/envbox-pro/projects/adminer">
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted
    DirectoryIndex index.php index.html
</Directory>

ErrorLog "C:/laragon/www/envbox-pro/projects/adminer/logs/apache_error.log"
LogLevel error
CustomLog "C:/laragon/www/envbox-pro/projects/adminer/logs/apache_access.log" common

# ⚡ Performance
KeepAlive On
MaxKeepAliveRequests 1000
KeepAliveTimeout 2
ThreadsPerChild 150
MaxConnectionsPerChild 0

# Compression
<IfModule deflate_module>
    AddOutputFilterByType DEFLATE text/html text/css text/javascript
    DeflateCompressionLevel 3
</IfModule>

# Cache headers
<IfModule expires_module>
    ExpiresActive On
    ExpiresByType text/css "access plus 1 year"
    ExpiresByType text/javascript "access plus 1 year"
    ExpiresByType image/png "access plus 1 year"
    ExpiresByType image/jpeg "access plus 1 year"
</IfModule>
