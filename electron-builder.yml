# electron-builder.yml
appId: com.envbox.pro
productName: EnvBox Pro
copyright: Copyright © 2024 EnvBox Pro
directories:
  output: dist
  buildResources: build

files:
  - main.js
  - preload.js
  - src/**/*
  - modules/**/*
  - templates/**/*
  - config/**/*
  - services/**/*
  - package.json
  - node_modules/**/*

extraResources:
  - from: environments
    to: environments
    filter:
      - "**/*"
  - from: templates
    to: templates
  - from: services
    to: services
  - from: config
    to: config

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.ico
  artifactName: "${productName}-${version}-${arch}.${ext}"
  publisherName: EnvBox Pro
  certificateFile: ""
  verifyUpdateCodeSignature: false

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: EnvBox Pro
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  deleteAppDataOnUninstall: false
  include: build/installer.nsh
  menuCategory: EnvBox Pro
  license: LICENSE.txt

portable:
  artifactName: "${productName}-${version}-portable.${ext}"

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  category: public.app-category.developer-tools

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: build/icon.png
  category: Development

publish:
  provider: github
  owner: envbox-pro
  repo: releases
  private: false
  releaseType: release

asar: true
asarUnpack:
  - "**/node_modules/node-pty/**"
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/keytar/**"

compression: maximum